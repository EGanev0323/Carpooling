name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java 21 / Maven)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: carpooling_test
          POSTGRES_USER: carpooling
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/carpooling_test
          DB_USER: carpooling
          DB_PASSWORD: test_password
          JWT_SECRET: ci-test-secret-that-is-at-least-64-characters-long-for-testing-only
          TURNSTILE_ENABLED: 'false'
          SEED_ENABLED: 'false'
          SPRING_PROFILES_ACTIVE: test
        run: mvn verify --no-transfer-progress

  frontend:
    name: Frontend (Node / Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Unit tests
        working-directory: frontend
        run: npm run test:unit -- --run

  docker-build:
    name: Docker Compose build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: |
          cp .env.example .env
          echo "JWT_SECRET=ci-test-secret-that-is-at-least-64-characters-long-replace-me" >> .env
          docker compose build --no-cache
