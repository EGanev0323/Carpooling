spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/carpooling}
    username: ${DB_USER:carpooling}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=15m
  mail:
    host: ${SMTP_HOST:smtp.mailtrap.io}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-64-chars-long-random-string-for-dev}
    access-token-expiry-minutes: 15
    refresh-token-expiry-days: 14
  turnstile:
    secret: ${TURNSTILE_SECRET:1x0000000000000000000000000000000AA}
    verify-url: https://challenges.cloudflare.com/turnstile/v0/siteverify
    enabled: ${TURNSTILE_ENABLED:false}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  seed:
    enabled: ${SEED_ENABLED:false}

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui.html
  show-actuator: false

logging:
  level:
    bg.tu_sofia.carpooling: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
