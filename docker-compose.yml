services:
  db:
    image: postgres:16
    container_name: carpooling-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carpooling
    ports:
      - "5432:5432"
    volumes:
      - carpooling_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carpooling"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  carpooling_data:
